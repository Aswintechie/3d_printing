name: Send Quote Email

on:
  repository_dispatch:
    types: [quote_request]

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Aswin
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "AswinPrints <noreply@aswincloud.com>",
              "to": ["aswin@aswincloud.com"],
              "reply_to": "${{ github.event.client_payload.email }}",
              "subject": "New Quote Request — ${{ github.event.client_payload.name }}",
              "html": "<div style=\"font-family:sans-serif;max-width:600px;margin:0 auto;background:#0a0a0f;color:#e8e8f0;padding:32px;border-radius:12px\"><div style=\"border-bottom:2px solid #ff6b00;padding-bottom:16px;margin-bottom:24px\"><h1 style=\"color:#ff6b00;margin:0;font-size:24px\">🖨️ New Quote Request</h1><p style=\"color:#8888a0;margin:4px 0 0\">AswinPrints — 3D Printing Services</p></div><table style=\"width:100%;border-collapse:collapse\"><tr><td style=\"padding:10px 0;border-bottom:1px solid #22222e;color:#8888a0;width:140px\">Name</td><td style=\"padding:10px 0;border-bottom:1px solid #22222e;font-weight:600\">${{ github.event.client_payload.name }}</td></tr><tr><td style=\"padding:10px 0;border-bottom:1px solid #22222e;color:#8888a0\">Email</td><td style=\"padding:10px 0;border-bottom:1px solid #22222e\"><a href=\"mailto:${{ github.event.client_payload.email }}\" style=\"color:#ff6b00\">${{ github.event.client_payload.email }}</a></td></tr><tr><td style=\"padding:10px 0;border-bottom:1px solid #22222e;color:#8888a0\">Phone</td><td style=\"padding:10px 0;border-bottom:1px solid #22222e\">${{ github.event.client_payload.phone }}</td></tr><tr><td style=\"padding:10px 0;border-bottom:1px solid #22222e;color:#8888a0\">Print Type</td><td style=\"padding:10px 0;border-bottom:1px solid #22222e\">${{ github.event.client_payload.type }}</td></tr><tr><td style=\"padding:10px 0;border-bottom:1px solid #22222e;color:#8888a0\">Quantity</td><td style=\"padding:10px 0;border-bottom:1px solid #22222e\">${{ github.event.client_payload.qty }}</td></tr></table><div style=\"margin-top:24px\"><p style=\"color:#8888a0;margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:1px\">Description</p><div style=\"background:#1a1a24;border-left:3px solid #ff6b00;padding:16px;border-radius:0 8px 8px 0;line-height:1.6\">${{ github.event.client_payload.desc }}</div></div><div style=\"margin-top:28px;text-align:center\"><a href=\"mailto:${{ github.event.client_payload.email }}\" style=\"display:inline-block;background:linear-gradient(135deg,#ff6b00,#ff8c38);color:white;padding:12px 28px;border-radius:8px;font-weight:700;text-decoration:none\">Reply to Customer</a></div></div>"
            }'

      - name: Acknowledge customer
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "AswinPrints <noreply@aswincloud.com>",
              "to": ["${{ github.event.client_payload.email }}"],
              "reply_to": "aswin@aswincloud.com",
              "subject": "Got your quote request! — AswinPrints",
              "html": "<div style=\"font-family:sans-serif;max-width:600px;margin:0 auto;background:#0a0a0f;color:#e8e8f0;padding:0;border-radius:12px;overflow:hidden\"><div style=\"background:linear-gradient(135deg,#ff6b00,#ff8c38);padding:36px 32px;text-align:center\"><h1 style=\"margin:0;font-size:28px;color:white;letter-spacing:-0.5px\">🖨️ AswinPrints</h1><p style=\"margin:8px 0 0;color:rgba(255,255,255,0.85);font-size:15px\">Custom 3D Printing · Pondicherry, India</p></div><div style=\"padding:32px\"><h2 style=\"margin:0 0 8px;font-size:20px\">Thanks, ${{ github.event.client_payload.name }}! 👋</h2><p style=\"color:#8888a0;margin:0 0 24px;line-height:1.6\">I've received your quote request and will get back to you within a few hours with pricing and details.</p><div style=\"background:#1a1a24;border-radius:10px;padding:20px;margin-bottom:24px\"><p style=\"margin:0 0 14px;font-size:13px;text-transform:uppercase;letter-spacing:1px;color:#8888a0\">Your Request Summary</p><table style=\"width:100%;border-collapse:collapse\"><tr><td style=\"padding:8px 0;border-bottom:1px solid #22222e;color:#8888a0;font-size:14px;width:110px\">Print Type</td><td style=\"padding:8px 0;border-bottom:1px solid #22222e;font-size:14px;font-weight:600\">${{ github.event.client_payload.type }}</td></tr><tr><td style=\"padding:8px 0;border-bottom:1px solid #22222e;color:#8888a0;font-size:14px\">Quantity</td><td style=\"padding:8px 0;border-bottom:1px solid #22222e;font-size:14px;font-weight:600\">${{ github.event.client_payload.qty }}</td></tr><tr><td style=\"padding:8px 0;color:#8888a0;font-size:14px;vertical-align:top;padding-top:10px\">Description</td><td style=\"padding:8px 0;font-size:14px;padding-top:10px;line-height:1.5\">${{ github.event.client_payload.desc }}</td></tr></table></div><p style=\"color:#8888a0;font-size:14px;line-height:1.6;margin:0 0 24px\">In the meantime, feel free to reply to this email if you have any questions or want to share reference images.</p><div style=\"text-align:center\"><a href=\"https://aswintechie.github.io/3d_printing/\" style=\"display:inline-block;background:linear-gradient(135deg,#ff6b00,#ff8c38);color:white;padding:12px 28px;border-radius:8px;font-weight:700;text-decoration:none;font-size:15px\">View Our Gallery</a></div></div><div style=\"background:#111118;padding:20px 32px;text-align:center;border-top:1px solid #22222e\"><p style=\"margin:0;font-size:13px;color:#8888a0\">Aswin Zayasankaran · <a href=\"https://www.aswincloud.com\" style=\"color:#ff6b00;text-decoration:none\">aswincloud.com</a> · Pondicherry, India</p></div></div>"
            }'
